<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSCreative™ — Your Playbook™</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
:root{
  --bg:#0a0a0a;--surface:#111111;--card:#161616;--border:#1f1f1f;--border2:#2a2a2a;
  --text:#ffffff;--dim:#a0a0a0;--dimmer:#555555;
  --orange:#F0601B;--orange-hover:#ff6d28;--orange-tint:rgba(240,96,27,0.1);
  --orange-border:rgba(240,96,27,0.28);--orange-dark:#ff8050;
  --green-bg:rgba(61,184,100,0.1);--green-text:#5DCAA5;--green-border:rgba(93,202,165,0.3);
  --radius-lg:10px;--radius-md:6px;
  --font:'Helvetica Neue',Helvetica,Arial,sans-serif;
  --font-num:'Barlow Condensed',sans-serif;
}
body.light{
  --bg:#f7f6f4;--surface:#edecea;--card:#e2e0dc;--border:#ccc9c2;--border2:#b8b4ac;
  --text:#0a0a0a;--dim:#404040;--dimmer:#888888;
  --orange-tint:#FEF0E8;--orange-border:#F4B89A;--orange-dark:#B84410;
  --green-bg:#E6F5EF;--green-text:#085041;--green-border:#5DCAA5;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;transition:background .25s,color .25s;}
body::before{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='grain'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23grain)' opacity='0.025'/%3E%3C/svg%3E");mix-blend-mode:overlay;}

#layout{display:flex;min-height:100vh}
#sidebar{width:228px;min-width:228px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:10;}
.sb-top{padding:1.35rem 1.25rem 1.1rem;border-bottom:1px solid var(--border);flex-shrink:0;}
.sb-brand{font-size:11px;font-weight:700;color:var(--orange);letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px;}
.sb-title{font-size:12px;font-weight:500;color:var(--dim);line-height:1.45}
.sb-foot{padding:1rem 1.25rem;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;}
#main{flex:1;margin-left:228px;display:flex;justify-content:center}
#wb{width:100%;max-width:700px;padding:2rem 2rem 5rem}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:1rem 0 1.25rem;border-bottom:1px solid var(--border);margin-bottom:2rem;}
.logo{font-size:11px;font-weight:600;color:var(--dimmer);letter-spacing:.1em;text-transform:uppercase;}
.theme-btn{background:none;border:1px solid var(--border2);border-radius:var(--radius-md);padding:5px 8px;cursor:pointer;color:var(--dimmer);display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.theme-btn:hover{color:var(--text)}
.icon-moon{display:block}.icon-sun{display:none}
body.light .icon-moon{display:none}body.light .icon-sun{display:block}

/* ── PLAYBOOK SPECIFIC STYLES ── */
.pb-cover{text-align:left;padding:2.5rem 0 0;margin-bottom:0;}
.pb-eyebrow{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--orange);margin-bottom:.75rem;}
.pb-title{font-family:var(--font-num);font-size:clamp(72px,13vw,140px);font-weight:900;line-height:.95;letter-spacing:-2px;color:var(--text);margin-bottom:2.5rem;}

/* ── METADATA ROW (Ashford-style 2×2) ── */
.pb-meta-row{display:grid;grid-template-columns:1fr 1fr;column-gap:2rem;}
.pb-meta-cell{padding:.65rem 0;}
.pb-meta-lbl{font-size:8px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dimmer);margin-bottom:3px;}
.pb-meta-val{font-size:12px;font-weight:700;color:var(--text);line-height:1.4;word-wrap:break-word;}
.pb-meta-val.empty{color:var(--dimmer);font-weight:400;font-style:italic;}

/* ── SECTION NAV ROW ── */
.pb-nav-row{display:grid;grid-template-columns:repeat(4,1fr);column-gap:1rem;margin-bottom:3rem;}
/* border-top on each nav link = 4 separate segments above; border-bottom = 4 below */
.pb-nav-link{display:flex;align-items:center;justify-content:space-between;padding:.65rem 0;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);text-decoration:none;transition:color .15s;border-top:1.5px solid var(--dimmer);border-bottom:1.5px solid var(--dimmer);}
.pb-nav-link:hover{color:var(--text);}
.pb-nav-arr{color:var(--orange);font-size:11px;flex-shrink:0;margin-left:4px;}

.pb-chapter{margin-bottom:3rem;}
.pb-ch-header{display:flex;align-items:center;gap:16px;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--border);}
.pb-ch-num{font-family:var(--font-num);font-size:48px;font-weight:900;color:var(--orange);line-height:1;opacity:.35;flex-shrink:0;}
.pb-ch-info{}
.pb-ch-label{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--dimmer);margin-bottom:2px;}
.pb-ch-title{font-size:18px;font-weight:700;color:var(--text);line-height:1.25;}

.pb-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem;}
.pb-grid.full{grid-template-columns:1fr;}
.pb-field{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:.9rem 1rem;}
.pb-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--orange);margin-bottom:5px;}
.pb-value{font-size:13px;color:var(--text);line-height:1.6;}
.pb-value.empty{color:var(--dimmer);font-style:italic;}
.pb-highlight.empty{background:var(--surface);border-color:var(--border);}
.pb-highlight.empty .pb-label{color:var(--orange);}
.pb-highlight.empty .pb-value{color:var(--dimmer);font-style:italic;font-size:13px;font-weight:400;}

.pb-highlight{background:var(--orange-tint);border:1px solid var(--orange-border);border-radius:var(--radius-lg);padding:1.1rem 1.4rem;margin-bottom:1rem;}
.pb-highlight .pb-label{color:var(--orange-dark);}
.pb-highlight .pb-value{color:var(--text);font-size:14px;font-weight:500;line-height:1.7;}

.pb-color-row{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;}
.pb-swatch{width:32px;height:32px;border-radius:4px;border:1px solid var(--border2);flex-shrink:0;}
.pb-color-info{display:flex;flex-direction:column;justify-content:center;}
.pb-color-name{font-size:11px;font-weight:600;color:var(--text);}
.pb-color-hex{font-size:10px;color:var(--dimmer);}

.pb-pillars{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem;}
.pb-pillar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:.85rem;}
.pb-pillar-n{font-family:var(--font-num);font-size:22px;font-weight:900;color:var(--orange);opacity:.4;line-height:1;margin-bottom:4px;}
.pb-pillar-name{font-size:12px;font-weight:600;color:var(--text);line-height:1.3;}
.pb-pillar-sub{font-size:11px;color:var(--dimmer);margin-top:3px;line-height:1.4;}

.pb-empty-chapter{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;text-align:center;margin-bottom:1rem;}
.pb-empty-text{font-size:13px;color:var(--dimmer);line-height:1.6;}
.pb-empty-link{font-size:12px;color:var(--orange);margin-top:.5rem;display:block;font-weight:500;}

.pb-print-btn{display:block;width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:10px;font-size:12px;font-family:var(--font);color:var(--dim);cursor:pointer;text-align:center;margin-top:2rem;transition:all .15s;}
.pb-print-btn:hover{background:var(--card);color:var(--text);}

/* ─── RESPONSIVE ─── */
@media(max-width:899px){
  #sidebar{display:none}
  #main{margin-left:0;display:block}
  #wb{padding:1.25rem 1.25rem 5rem}
}
@media(min-width:900px){
  .topbar{display:none}
}

@media print{
  #sidebar,#topbar-wrap,.pb-print-btn{display:none!important}
  #main{margin-left:0!important}
  body{background:#fff;color:#000}
}
</style>
</head>
<body>
<div id="layout">
  <aside id="sidebar">
    <div class="sb-top">
      <div class="sb-brand">FSCreative™ — Module 05</div>
      <div class="sb-title">Your Playbook™</div>
    </div>
    <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:1rem;text-align:center;">
      <div style="font-size:12px;color:var(--dimmer);line-height:1.6">This is your master reference document. All your answers in one place.</div>
    </div>
    <div class="sb-foot">
      <button class="theme-btn" onclick="document.body.classList.toggle('light');var _t=document.body.classList.contains('light')?'light':'dark';localStorage.setItem('blp-theme',_t);try{window.parent.postMessage({type:'toggle-theme',value:_t},'*');}catch(e){}" aria-label="Toggle theme">
        <svg class="icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="icon-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
    </div>
  </aside>

  <div id="main">
    <div id="wb">
      <div id="topbar-wrap" class="topbar">
        <div class="logo">FSCreative™ — Your Playbook™</div>
        <button class="theme-btn" onclick="document.body.classList.toggle('light');var _t=document.body.classList.contains('light')?'light':'dark';localStorage.setItem('blp-theme',_t);try{window.parent.postMessage({type:'toggle-theme',value:_t},'*');}catch(e){}" aria-label="Toggle theme">
          <svg class="icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="icon-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>

      <div id="playbook-doc">
        <!-- Rendered by JS -->
        <div style="text-align:center;padding:4rem 0;color:var(--dimmer);font-size:13px;">Loading your playbook...</div>
      </div>
    </div>
  </div>
</div>

<script>
/* ── THEME ── */
(function(){var t=localStorage.getItem('blp-theme');if(t==='light')document.body.classList.add('light');})();

/* ── HELPERS ── */
function val(v, fallback) {
  if (!v || v === '' || v === null || v === undefined) return fallback || '';
  return String(v).trim();
}
function field(label, value, ph) {
  var v = val(value);
  var isEmpty = !v;
  var display = isEmpty ? (ph || 'Not completed yet') : escHtml(v);
  return '<div class="pb-field"><div class="pb-label">' + label + '</div><div class="pb-value' + (isEmpty?' empty':'') + '">' + display + '</div></div>';
}
function highlight(label, value, ph) {
  var v = val(value);
  var isEmpty = !v;
  var display = isEmpty ? (ph || null) : escHtml(v);
  if (!display) return '';
  return '<div class="pb-highlight' + (isEmpty?' empty':'') + '"><div class="pb-label">' + label + '</div><div class="pb-value' + (isEmpty?' empty':'') + '">' + display + '</div></div>';
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
function chapter(num, label, title, content) {
  return '<div class="pb-chapter" id="ch'+num+'"><div class="pb-ch-header"><div class="pb-ch-num">' + num + '</div><div class="pb-ch-info"><div class="pb-ch-label">' + label + '</div><div class="pb-ch-title">' + title + '</div></div></div>' + content + '</div>';
}
function emptyChapter(msg) {
  return '<div class="pb-empty-chapter"><div class="pb-empty-text">' + msg + '</div></div>';
}
function grid(fields) { return '<div class="pb-grid">' + fields.join('') + '</div>'; }
function gridFull(fields) { return '<div class="pb-grid full">' + fields.join('') + '</div>'; }

/* ── LOAD DATA ── */
function loadKey(key) {
  try {
    var raw = localStorage.getItem(key);
    if (!raw) return {};
    return JSON.parse(raw) || {};
  } catch(e) { return {}; }
}

function buildPlaybook() {
  var cf = loadKey('cfww-v2');
  var vwRaw = loadKey('vww-v1');
  var vw = (vwRaw && vwRaw.inputs) ? vwRaw.inputs : {};
  var vwOpts = (vwRaw && vwRaw.opts) ? vwRaw.opts : {};
  var ccRaw = loadKey('ccb-v1');
  var cc = (ccRaw && ccRaw.inputs) ? ccRaw.inputs : {};
  var ccOpts = (ccRaw && ccRaw.opts) ? ccRaw.opts : {};
  var la = loadKey('launch-v1');
  var laOpts = (la && la.opts) ? la.opts : {};

  var userName = val(localStorage.getItem('vww-user-name')) || val(cf.brandName) || val(la.brandName) || 'Your Brand';
  var today = new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});

  var html = '';

  /* ── COVER ── */
  // Handle: bio entry takes priority; sign-up handle as fallback
  var bioHandle = val(la.bioUsername) || val(la.username) || '';
  var signupHandle = val(localStorage.getItem('vww-user-handle'))
    || val(localStorage.getItem('vww-user-instagram'))
    || val(cf.brandHandle) || '';
  var handle = bioHandle || signupHandle;

  // Known For — full text, no truncation
  var knownFor = val(cf.q2known) || '';

  // 90-Day Goal — primary content goal, falling back to audience or revenue
  var goal90 = val(la.goal90Content) || val(la.goal90Audience) || val(la.goal90Revenue) || '';

  function metaCell(lbl, v, ph) {
    var empty = !v;
    return '<div class="pb-meta-cell"><div class="pb-meta-lbl">'+lbl+'</div><div class="pb-meta-val'+(empty?' empty':'')+'">'+escHtml(empty?ph:v)+'</div></div>';
  }
  function navLink(href, label) {
    return '<a class="pb-nav-link" href="'+href+'">'+label+'<span class="pb-nav-arr">&#8599;</span></a>';
  }

  html += '<div class="pb-cover">';
  html += '<div class="pb-eyebrow">FSCreative\u2122 \u2014 The Brand Launch Playbook\u2122</div>';
  html += '<div class="pb-title">YOUR<br>PLAYBOOK</div>';
  html += '<div class="pb-meta-row">';
  html += metaCell('Creator', userName, 'Your Name');
  html += metaCell('Handle', handle, 'Not set');
  html += metaCell('Known For', knownFor, 'Complete Brand Foundation');
  html += metaCell('90-Day Goal', goal90, 'Complete Launch module');
  html += '</div>';
  html += '<div class="pb-nav-row">';
  html += navLink('#ch01', 'Foundation');
  html += navLink('#ch02', 'Visuals');
  html += navLink('#ch03', 'Content');
  html += navLink('#ch04', 'Launch');
  html += '</div>';
  html += '</div>';

  /* ── CHAPTER 01: BRAND FOUNDATION ── */
  var cfEmpty = !cf || Object.keys(cf).length === 0;
  var cfContent = '';
  if (cfEmpty) {
    cfContent = emptyChapter('Complete Module 01 \u2014 Brand Foundation to see your answers here.');
  } else {
    cfContent += highlight('Brand Journey Statement', cf.brandJourneyStmt, 'Complete Workshop 1 — Brand Journey to generate your statement.');
    cfContent += grid([
      field('Desired Outcome', cf.q1outcome, 'e.g. Sign 5 high-ticket clients/month at $5K each within 12 months'),
      field('Known For', cf.q2known, 'e.g. Helping creators build premium personal brands that attract high-quality clients')
    ]);
    cfContent += grid([
      field('Actions', cf.q3do, 'e.g. Post 3–5x/week, document process, share client results publicly'),
      field('Learning Priority', cf.q4learn, 'e.g. Writing scroll-stopping hooks, showing up on camera with confidence')
    ]);
    cfContent += highlight('Core Mission', cf.coreMission, 'Complete Workshop 3 — Core Mission to define your purpose statement.');
    cfContent += highlight('Ikigai', cf.ikigaiCenter, 'Complete Workshop 3 — Ikigai to find the intersection of passion, skill, and market demand.');
    cfContent += highlight('Avatar Statement', cf.avatarStatement, 'Complete Workshop 2 — Avatar to generate your ideal customer profile.');
    var demoCombined = [val(cf.av1Age), val(cf.av1Occupation)].filter(Boolean).join(' \u00b7 ');
    cfContent += grid([
      field('Demographics', demoCombined, 'e.g. 25–35 · Freelance Designer / Agency Owner'),
      field('Struggle', cf.av1Struggle, 'e.g. Creating content for months with zero clients to show for it')
    ]);
    cfContent += grid([
      field('Desired Outcome', cf.av1Desired, 'e.g. Replace 9-to-5 income with inbound clients from content alone'),
      field('Where They Hang Out', cf.av1Platforms, 'e.g. Instagram, YouTube, LinkedIn')
    ]);
    /* Values */
    var hasVals = false;
    var valsHtml = '<div class="pb-pillars">';
    for (var vi = 1; vi <= 5; vi++) {
      var vname = val(cf['val'+vi+'name']);
      if (vname) {
        hasVals = true;
        var vpractice = val(cf['val'+vi+'practice']);
        valsHtml += '<div class="pb-pillar"><div class="pb-pillar-n">0'+vi+'</div><div class="pb-pillar-name">'+escHtml(vname)+'</div>';
        if (vpractice) valsHtml += '<div class="pb-pillar-sub">'+escHtml(vpractice)+'</div>';
        valsHtml += '</div>';
      }
    }
    valsHtml += '</div>';
    if (hasVals) cfContent += '<div style="margin:.75rem 0 .4rem"><div class="pb-label">Core Values</div></div>' + valsHtml;
    /* Content Pillars */
    var pillarsHtml = '<div class="pb-pillars">';
    var hasPillars = false;
    for (var pi = 1; pi <= 5; pi++) {
      var pname = val(cf['pillar'+pi+'name']);
      if (pname) {
        hasPillars = true;
        pillarsHtml += '<div class="pb-pillar"><div class="pb-pillar-n">0'+pi+'</div><div class="pb-pillar-name">'+escHtml(pname)+'</div>';
        var psub = val(cf['pillar'+pi+'sub']);
        if (psub) pillarsHtml += '<div class="pb-pillar-sub">'+escHtml(psub)+'</div>';
        pillarsHtml += '</div>';
      }
    }
    pillarsHtml += '</div>';
    if (hasPillars) cfContent += '<div style="margin:.75rem 0 .4rem"><div class="pb-label">Content Pillars</div></div>' + pillarsHtml;
    cfContent += highlight('Origin Story', cf.originStory, 'Complete Workshop 6 — Origin Story to write your full brand story.');
    cfContent += grid([
      field('3-Year Vision', cf.vision3yr, 'e.g. 50K audience, $30K/month revenue, known for premium brand building'),
      field('Impact', cf.visionImpact, 'e.g. Help 1,000 creators go full-time from their content')
    ]);
    cfContent += highlight('Brand Vision', cf.brandVision, 'Complete Workshop 7 — Brand Vision to define where your brand is going.');
  }
  html += chapter('01', 'Module 01', 'Brand Foundation', cfContent);

  /* ── CHAPTER 02: YOUR VISUAL WORLD ── */
  var vwEmpty = !vwRaw || Object.keys(vwRaw).length === 0;
  var vwContent = '';
  if (vwEmpty) {
    vwContent = emptyChapter('Complete Module 02 \u2014 Define Your Visual World to see your answers here.');
  } else {
    vwContent += highlight('Visual World Narrative', vw.vwNarrative, 'Complete Module 02 — Define Your Visual World to generate your narrative.');
    vwContent += highlight('Mood Board Statement', vw.mbStatement, 'Complete the Mood Board workshop to define the visual feeling of your brand.');
    /* Color palette */
    var colors = [
      {label:'Primary', val:vw['col-primary'], emo:vw['col-primary-emotion']},
      {label:'Secondary', val:vw['col-secondary']},
      {label:'Accent', val:vw['col-accent']},
      {label:'Neutral', val:vw['col-neutral']}
    ];
    var swatchHtml = '<div class="pb-field" style="margin-bottom:10px"><div class="pb-label">Color Palette' + (val(vw.paletteName) ? ' \u2014 ' + escHtml(val(vw.paletteName)) : '') + '</div>';
    var hasColors = false;
    colors.forEach(function(c){
      var cv = val(c.val);
      if (!cv) return;
      hasColors = true;
      var bg = cv.startsWith('#') ? cv : 'transparent';
      swatchHtml += '<div class="pb-color-row"><div class="pb-swatch" style="background:'+escHtml(bg)+';border-color:'+escHtml(bg)+'"></div><div class="pb-color-info"><div class="pb-color-name">'+c.label+(c.emo?' \u2014 '+escHtml(val(c.emo)):'')+'</div><div class="pb-color-hex">'+escHtml(cv)+'</div></div></div>';
    });
    swatchHtml += '</div>';
    if (hasColors) vwContent += swatchHtml;
    /* Mood & Setting */
    vwContent += '<div style="margin:.75rem 0 .4rem"><div class="pb-label">Mood &amp; Setting</div></div>';
    vwContent += '<div class="pb-grid" style="grid-template-columns:1fr 1fr 1fr">' + [
      field('Setting', vw['e1-location'], 'e.g. Home studio / coffee shop'),
      field('Environment', vwOpts.e1vibe, 'e.g. Dark & minimal'),
      field('Primary Mood', vwOpts.e2mood, 'e.g. Premium, cinematic, calm')
    ].join('') + '</div>';
    vwContent += '<div class="pb-grid" style="grid-template-columns:1fr 1fr 1fr">' + [
      field('Lighting', vwOpts.e2light, 'e.g. Key light + soft window'),
      field('Time of Day', vw['e2-time'], 'e.g. Morning, golden hour'),
      field('Color Grade', vwOpts.e3grade, 'e.g. Warm desaturated, film-like')
    ].join('') + '</div>';
    vwContent += highlight('Setting Statement', vw['e1-statement'], 'Complete the Setting workshop to write your environment statement.');
    vwContent += highlight('Mood Statement', vw['e2-statement'], 'Complete the Mood workshop to write your visual mood statement.');
    /* Design Details */
    vwContent += '<div style="margin:.75rem 0 .4rem"><div class="pb-label">Design Details</div></div>';
    vwContent += grid([
      field('Signature Objects', vw['e4-objects'], 'e.g. Camera, coffee, open notebook, clean desk'),
      field('Wardrobe', vw['e4-wardrobe'], 'e.g. Neutral tones — black, white, grey, earth')
    ]);
    vwContent += gridFull([field('Never On Camera', vw['e4-never'], 'e.g. Cluttered backgrounds, bright logos, distracting patterns')]);
    /* Content Approach */
    vwContent += grid([
      field('Content Format', vwOpts.e6format, 'e.g. Long-form YouTube + short-form Reels'),
      field('Energy', vwOpts.e6energy, 'e.g. Calm, authoritative, direct')
    ]);
    vwContent += highlight('Content Approach Statement', vw['e6-statement'], 'Complete the Content Approach workshop to define your content style.');
    vwContent += grid([
      field('What Makes You Different', vw.synDiff, 'e.g. Cinematic quality + business education — nobody else does both'),
      field('What You Own', vw.synOwn, 'e.g. The look of a $10K shoot achievable on a phone')
    ]);
  }
  html += chapter('02', 'Module 02', 'Your Visual World', vwContent);

  /* ── CHAPTER 03: CREATE YOUR CONTENT ── */
  var ccEmpty = !ccRaw || Object.keys(ccRaw).length === 0;
  var ccContent = '';
  if (ccEmpty) {
    ccContent = emptyChapter('Complete Module 03 \u2014 Create Your Content to see your answers here.');
  } else {
    ccContent += highlight('The Painful Problem', cc.painProblem, 'Complete the Strategy workshop to define the exact problem you solve.');
    ccContent += highlight('My Unique Solution', cc.uniqueSol, 'Complete the Strategy workshop to define how you solve it differently.');
    ccContent += highlight('My Contextual Credibility', cc.credibility, 'Complete the Strategy workshop to define why they should believe you.');
    ccContent += '<div class="pb-grid" style="grid-template-columns:1fr 1fr 1fr">' + [
      field('Primary Platform', cc.sauron, 'e.g. Instagram'),
      field('Weekly Hours', cc.weekHours, 'e.g. 6 hours/week'),
      field('Content Cadence', cc.cadence, 'e.g. 3 reels/week + 1 long-form/month')
    ].join('') + '</div>';
    /* Content topics */
    var topicFields = [];
    for (var ti = 1; ti <= 3; ti++) {
      var tn = val(cc['topic'+ti]);
      if (tn) {
        var ts = val(cc['topic'+ti+'subs']);
        topicFields.push(field('Topic ' + ti, tn + (ts ? '\n' + ts : '')));
      }
    }
    if (topicFields.length) ccContent += gridFull(topicFields);
    /* Story framework */
    if (val(cc.storyI) || val(cc.storyH1) || val(cc.storyP)) {
      ccContent += '<div style="margin:.75rem 0 .4rem"><div class="pb-label">Story Framework</div></div>';
      ccContent += grid([
        field('Identity (I Am)', cc.storyI, 'e.g. Why most creators never make money from content'),
        field('Hook', cc.storyH1, 'e.g. Most creators spend hours on content that gets zero engagement — but it\'s not their fault'),
        field('Problem', cc.storyP, 'e.g. They\'re optimizing for views instead of trust'),
        field('Journey', cc.storyJ, 'e.g. I spent 3 years posting before I figured out what was actually broken')
      ]);
      ccContent += grid([
        field('Lesson', cc.storyL, 'e.g. Trust converts. Virality doesn\'t.'),
        field('CTA', cc.storyC, 'e.g. Follow for the system I wish I had on day one')
      ]);
    }
    /* Offer ladder */
    if (val(cc.ofree) || val(cc.olead) || val(cc.olow)) {
      ccContent += '<div style="margin:.75rem 0 .4rem"><div class="pb-label">Offer Ladder</div></div>';
      ccContent += grid([
        field('Free Content', cc.ofree),
        field('Lead Magnet', cc.olead),
        field('Low-Ticket', cc.olow),
        field('Mid-Ticket', cc.omid),
        field('High-Ticket', cc.ohigh)
      ]);
    }
    if (val(cc.conv) || val(cc.ctastrat)) {
      ccContent += grid([
        field('Conversion Strategy', cc.conv),
        field('CTA Strategy', cc.ctastrat)
      ]);
    }
  }
  html += chapter('03', 'Module 03', 'Create Your Content', ccContent);

  /* ── CHAPTER 04: LAUNCH ── */
  var laEmpty = !la || Object.keys(la).length === 0;
  var laContent = '';
  if (laEmpty) {
    laContent = emptyChapter('Complete Module 04 \u2014 Launch to see your answers here.');
  } else {
    /* Bio */
    laContent += '<div style="margin:.75rem 0 .4rem"><div class="pb-label">Bio</div></div>';
    laContent += grid([
      field('Username', la.bioUsername || la.bioUsernameAlt),
      field('Link in Bio', la.igLink)
    ]);
    var bioFull = val(la.igBio) || [val(la.bioLine1),val(la.bioLine2),val(la.bioLine3),val(la.bioLine4)].filter(Boolean).join('\n');
    laContent += highlight('Instagram Bio', bioFull);
    laContent += grid([
      field('LinkedIn Headline', la.liHeadline),
      field('TikTok Bio', la.ttBio)
    ]);
    /* Funnel */
    laContent += '<div style="margin:.75rem 0 .4rem"><div class="pb-label">Your Funnel</div></div>';
    laContent += grid([
      field('Content Platforms', la.funnelPlatforms),
      field('Email Platform', la.funnelEmailPlatform)
    ]);
    var offerPrice = [val(la.funnelOffer), val(la.funnelPrice)].filter(Boolean).join(' \u2014 ');
    laContent += grid([
      field('Primary CTA', la.funnelCTA),
      field('Core Offer + Price', offerPrice || la.funnelOffer)
    ]);
    /* ManyChat & Newsletter */
    laContent += '<div style="margin:.75rem 0 .4rem"><div class="pb-label">ManyChat &amp; Newsletter</div></div>';
    laContent += grid([
      field('Trigger Keyword', la.mcKeyword),
      field('Newsletter Name', la.nlName)
    ]);
    var nlFormatFreq = [val(laOpts.nlFormat), val(laOpts.nlFreq), val(la.nlDay)].filter(Boolean).join(' \u00b7 ');
    laContent += grid([
      field('Format + Frequency', nlFormatFreq),
      field('Value Promise', la.nlValuePromise)
    ]);
    /* Lead Magnet */
    laContent += '<div style="margin:.75rem 0 .4rem"><div class="pb-label">Lead Magnet</div></div>';
    laContent += highlight('Lead Magnet Name', la.lmName);
    var lmFormatDelivery = [val(laOpts.lmFormat), val(laOpts.lmDelivery)].filter(Boolean).join(' \u00b7 ');
    laContent += grid([
      field('The One Big Win', la.lmBigWin),
      field('Format + Delivery', lmFormatDelivery)
    ]);
    laContent += gridFull([field('CTA', la.lmCTA)]);
    /* 3 Launch Videos */
    if (val(la.story1hook) || val(la.story1why) || val(la.pos1claim) || val(la.exp1format)) {
      laContent += '<div style="margin:.75rem 0 .4rem"><div class="pb-label">Launch Videos</div></div>';
      if (val(la.story1hook) || val(la.story1why)) {
        laContent += '<div style="font-size:10px;font-weight:700;color:var(--dimmer);text-transform:uppercase;letter-spacing:.1em;margin:.75rem 0 .4rem">Video 1 \u2014 Your Story</div>';
        laContent += highlight('Hook', la.story1hook);
        laContent += grid([
          field('Why You Do This', la.story1why),
          field('The Challenge', la.story1challenge),
          field('The Turn', la.story1turning),
          field('What You Learned', la.story1learned)
        ]);
        laContent += gridFull([field('CTA', la.story1cta)]);
      }
      if (val(la.pos1claim) || val(la.pos1belief)) {
        laContent += '<div style="font-size:10px;font-weight:700;color:var(--dimmer);text-transform:uppercase;letter-spacing:.1em;margin:.75rem 0 .4rem">Video 2 \u2014 Positioning Deep Dive</div>';
        laContent += highlight('Core Claim', la.pos1claim);
        laContent += grid([
          field('Core Belief', la.pos1belief),
          field('Anchor Statement', la.pos1anchor)
        ]);
      }
      if (val(la.exp1format) || val(la.exp1idea)) {
        laContent += '<div style="font-size:10px;font-weight:700;color:var(--dimmer);text-transform:uppercase;letter-spacing:.1em;margin:.75rem 0 .4rem">Video 3 \u2014 Experimentation Video</div>';
        laContent += grid([
          field('Format', la.exp1format),
          field('Idea', la.exp1idea),
          field('How It Feels Different', la.exp1diff1 || la.exp1feel),
          field('Target Audience', la.exp1audience)
        ]);
      }
    }
    /* 90-Day Goals */
    laContent += '<div style="margin:.75rem 0 .4rem"><div class="pb-label">90-Day Goals</div></div>';
    laContent += grid([
      field('Followers Goal', la.goal90Followers),
      field('Email Subscribers', la.goal90Email)
    ]);
    laContent += grid([
      field('Revenue Goal', la.goal90Revenue),
      field('Review Date', la.reviewDate)
    ]);
    laContent += grid([
      field('Audience Goal', la.goal90Audience),
      field('System Goal', la.goal90System)
    ]);
    laContent += highlight('Content Goal', la.goal90Content);
    laContent += highlight('Offer Goal', la.goal90Offer);
    if (val(la.accountabilityPartner)) {
      laContent += grid([field('Accountability Partner', la.accountabilityPartner)]);
    }
  }
  html += chapter('04', 'Module 04', 'Launch', laContent);

  /* ── CTA ── */
  html += '<div style="margin-top:3rem;background:var(--orange-tint);border:1px solid var(--orange-border);border-radius:var(--radius-lg);padding:1.75rem 1.5rem;text-align:center">';
  html += '<div style="font-size:18px;font-weight:700;color:var(--text);margin-bottom:.6rem">Want help implementing your brand?</div>';
  html += '<p style="font-size:13px;color:var(--dim);line-height:1.65;margin-bottom:1.25rem">The Brand Launch Sprint\u2122 is a focused 30-day execution environment where you install your complete premium personal brand with direct creative direction from Gabe. Weekly live sessions. Direct feedback on every step. A community of creators doing the work alongside you.</p>';
  html += '<a href="https://fscreative.live" target="_blank" style="display:inline-block;background:var(--orange);color:#fff;font-size:13px;font-weight:600;padding:.7rem 1.5rem;border-radius:var(--radius-md);text-decoration:none" onmouseover="this.style.background=\'var(--orange-hover)\'" onmouseout="this.style.background=\'var(--orange)\'">Join Brand Launch Sprint\u2122 \u2192</a>';
  html += '</div>';

  /* ── PRINT ── */
  html += '<button class="pb-print-btn" onclick="window.print()">Print / Save as PDF</button>';

  document.getElementById('playbook-doc').innerHTML = html;
}

buildPlaybook();

/* ── IFRAME BRIDGE ── */
var PB_IN_FRAME = (window.self !== window.top);
if(PB_IN_FRAME){
  var sb=document.getElementById('sidebar');if(sb)sb.style.display='none';
  var mn=document.getElementById('main');if(mn){mn.style.marginLeft='0';mn.style.width='100%';}
  var wb=document.getElementById('wb');if(wb)wb.style.maxWidth='100%';
  var tb=document.getElementById('topbar-wrap');if(tb)tb.style.display='none';
}
function pbNotifyShell(){
  if(!PB_IN_FRAME)return;
  window.parent.postMessage({type:'sectionChange',cur:0,done:[]},'*');
}
window.addEventListener('message',function(e){
  if(!e.data) return;
  if(e.data.type==='theme'){document.body.classList.toggle('light',e.data.value==='light');return;}
  if(e.data.type!=='navigate')return;
  window.scrollTo(0,0);
  buildPlaybook(); /* Refresh data on navigate */
  pbNotifyShell();
});
setTimeout(function(){
  if(!PB_IN_FRAME)return;
  window.parent.postMessage({type:'ready',cur:0,done:[]},'*');
},300);
</script>
</body>
</html>
