<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSCreative™ — Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
:root{
  --bg:#0a0a0a;--surface:#111111;--card:#161616;--border:#1f1f1f;--border2:#2a2a2a;
  --text:#ffffff;--dim:#a0a0a0;--dimmer:#555555;
  --orange:#F0601B;--orange-hover:#ff6d28;--orange-tint:rgba(240,96,27,0.1);--orange-border:rgba(240,96,27,0.28);--orange-dark:#ff8050;
  --green-bg:rgba(61,184,100,0.1);--green-text:#5DCAA5;--green-border:rgba(93,202,165,0.3);
  --radius-lg:10px;--radius-md:6px;
  --font:'Helvetica Neue',Helvetica,Arial,sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;}

/* ── AUTH ── */
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem;}
.auth-box{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:2rem;width:100%;max-width:360px;}
.auth-brand{font-size:10px;font-weight:700;color:var(--orange);letter-spacing:.12em;text-transform:uppercase;margin-bottom:1rem;}
.auth-title{font-size:20px;font-weight:700;margin-bottom:.5rem;letter-spacing:-.3px;}
.auth-sub{font-size:13px;color:var(--dim);margin-bottom:1.5rem;}
.auth-input{width:100%;border:1px solid var(--border);border-radius:var(--radius-md);padding:10px 12px;font-size:14px;font-family:var(--font);color:var(--text);background:var(--bg);margin-bottom:1rem;transition:border-color .15s;}
.auth-input:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px rgba(240,96,27,.08);}
.auth-btn{width:100%;background:var(--orange);color:#fff;border:none;border-radius:var(--radius-md);padding:11px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);}
.auth-btn:hover{background:var(--orange-hover);}
.auth-error{font-size:12px;color:#e05555;margin-bottom:.8rem;display:none;}

/* ── DASHBOARD ── */
#dashboard{display:none;min-height:100vh;}
.dash-header{background:var(--surface);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;}
.dash-brand{font-size:11px;font-weight:700;color:var(--orange);letter-spacing:.1em;text-transform:uppercase;}
.dash-title{font-size:13px;color:var(--dim);margin-top:2px;}
.dash-logout{font-size:12px;color:var(--dimmer);cursor:pointer;background:none;border:1px solid var(--border);padding:5px 10px;border-radius:var(--radius-md);font-family:var(--font);}
.dash-logout:hover{color:var(--text);border-color:var(--border2);}
.dash-body{padding:2rem;max-width:1200px;margin:0 auto;}

/* ── STATS ── */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:2rem;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:1rem 1.2rem;}
.stat-num{font-family:'Barlow Condensed',sans-serif;font-size:40px;font-weight:900;line-height:1;color:var(--text);}
.stat-lbl{font-size:10.5px;color:var(--dimmer);margin-top:4px;text-transform:uppercase;letter-spacing:.06em;font-weight:500;}

/* ── TABLE ── */
.section-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--dimmer);margin-bottom:.8rem;}
.user-table{width:100%;border-collapse:collapse;}
.user-table th{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--dimmer);text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);}
.user-table td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:13px;}
.user-row{cursor:pointer;transition:background .1s;}
.user-row:hover td{background:var(--surface);}
.user-row.expanded td{background:var(--surface);}

/* ── AVATAR ── */
.u-avatar{width:32px;height:32px;border-radius:50%;background:var(--orange-tint);border:1px solid var(--orange-border);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--orange-dark);flex-shrink:0;}
.u-name{font-weight:600;color:var(--text);}
.u-email{font-size:11.5px;color:var(--dimmer);margin-top:1px;}

/* ── PROGRESS ── */
.u-prog-bar{height:4px;background:var(--border);border-radius:2px;width:70px;display:inline-block;vertical-align:middle;margin-right:6px;}
.u-prog-fill{height:100%;border-radius:2px;background:var(--orange);}
.u-prog-fill.full{background:var(--green-text);}

/* ── MODULE BADGES ── */
.mod-badges{display:flex;gap:3px;flex-wrap:wrap;}
.mbadge{display:inline-flex;align-items:center;gap:3px;font-size:9px;padding:2px 7px;border-radius:10px;font-weight:600;border:1px solid var(--border);color:var(--dimmer);white-space:nowrap;}
.mbadge.has{background:var(--green-bg);color:var(--green-text);border-color:var(--green-border);}

/* ── CHEVRON ── */
.expand-chevron{color:var(--dimmer);transition:transform .2s;display:inline-block;}
.user-row.expanded .expand-chevron{transform:rotate(180deg);}

/* ── DETAIL ROW ── */
.detail-row{display:none;}
.detail-row.open{display:table-row;}
.detail-cell{padding:0!important;border-bottom:2px solid var(--orange-border)!important;background:var(--card)!important;}
.detail-inner{padding:1.5rem 2rem;}

/* ── MODULE SECTION ── */
.mod-section{margin-bottom:1.5rem;}
.mod-section:last-child{margin-bottom:0;}
.mod-sec-head{display:flex;align-items:center;gap:10px;margin-bottom:.85rem;}
.mod-sec-num{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:var(--orange);opacity:.5;line-height:1;}
.mod-sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--orange);}
.mod-sec-rule{flex:1;height:1px;background:var(--border);}

/* ── ANSWER CARDS ── */
.ans-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px;}
.ans-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:.7rem .9rem;}
.ans-key{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--dimmer);margin-bottom:3px;}
.ans-val{font-size:12.5px;color:var(--text);line-height:1.55;word-break:break-word;white-space:pre-wrap;}
.no-data{font-size:12px;color:var(--dimmer);font-style:italic;padding:.5rem 0;}

/* ── MISC ── */
#loading{text-align:center;padding:3rem;color:var(--dimmer);font-size:13px;}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--orange);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:.5rem;}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:3rem;color:var(--dimmer);font-size:13px;}
.refresh-btn{font-size:11px;color:var(--dimmer);cursor:pointer;background:none;border:1px solid var(--border);padding:4px 10px;border-radius:var(--radius-md);font-family:var(--font);margin-left:auto;display:block;margin-bottom:1rem;}
.refresh-btn:hover{color:var(--text);}
.u-seen{font-size:11.5px;color:var(--dimmer);}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-brand">FSCreative™</div>
    <div class="auth-title">Admin Dashboard</div>
    <div class="auth-sub">Enter the admin password to view user progress.</div>
    <div id="auth-error" class="auth-error">Incorrect password.</div>
    <input type="password" id="auth-pass" class="auth-input" placeholder="Password" onkeydown="if(event.key==='Enter')checkAuth()">
    <button class="auth-btn" onclick="checkAuth()">Sign In</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="dash-header">

      <div class="dash-brand">FSCreative™ — Admin</div>

    </div>
    <button class="dash-logout" onclick="logout()">Sign Out</button>

    </div>
    <div id="user-empty" class="empty" style="display:none">No users yet.</div>
  </div>
</div>

/* Modules and which fields belong to each (for grouping in detail view) */
var MODULE_DEFS = [
  {id:'cf',  num:'01', title:'Brand Foundation', table:'vww_progress_cf', flat:true,
   fields:['q1outcome','q1why','q2known','q3do','q4learn','brandJourneyStmt','av1Age','av1Occupation','av1Gender','av1Income','av1Situation','av1Who','av1Look','av1Struggle','av1Tried','av1Desired','av1Fears','av1Transform','av1Quote','av2Age','av2Occupation','av2Gender','av2Income','av2Situation','av2Who','av2Look','av2Struggle','av2Tried','av2Desired','av2Fears','av2Transform','av2Quote','ikigaiLove','ikigaiGood','ikigaiPaid','ikigaiWorld','missionAvatar','missionOutcome','missionMethod','missionWhy','missionPreview','val1name','val1desc','val2name','val2desc','val3name','val3desc','val4name','val4desc','val5name','val5desc','val6name','val6desc','pillar1','pillar1offer','pillar2','pillar2offer','pillar3','pillar3offer','pillar4','pillar4offer','pillar5','pillar5offer','storyBefore','storyTrigger','storyHero','storyStruggle','storyBreakthrough','storyTransformation','storyNow','storyTeach','brandVision']},

];

function sbH() {
  return {'apikey':SUPABASE_ANON,'Authorization':'Bearer '+SUPABASE_ANON,'Content-Type':'application/json'};
}

function checkAuth() {
  var pass = document.getElementById('auth-pass').value;
  var err  = document.getElementById('auth-error');
  if (pass === ADMIN_PASSWORD) {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadDashboard();
  } else {
    err.style.display = 'block';
    document.getElementById('auth-pass').value = '';
    document.getElementById('auth-pass').focus();
  }
}

function logout() {
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('auth-pass').value = '';
}

async function loadDashboard() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('user-list').style.display = 'none';
  document.getElementById('user-empty').style.display = 'none';

  try {
    var [usersR, mainR, cfR] = await Promise.all([
      fetch(SUPABASE_URL+'/rest/v1/vww_users?select=*&order=last_seen.desc', {headers:sbH()}),
      fetch(SUPABASE_URL+'/rest/v1/vww_progress?select=email,data,updated_at', {headers:sbH()}),
      fetch(SUPABASE_URL+'/rest/v1/vww_progress_cf?select=email,data,updated_at', {headers:sbH()})
    ]);
    var users   = await usersR.json();
    var mainProg = await mainR.json();
    var cfProg   = await cfR.json();

    /* Build per-email maps */
    var mainMap={}, cfMap={};
    if (Array.isArray(mainProg)) mainProg.forEach(function(p){ mainMap[p.email]=p; });
    if (Array.isArray(cfProg))   cfProg.forEach(function(p){ cfMap[p.email]=p; });

    if (!Array.isArray(users)) users = [];

    /* Stats */
    var total = users.length;
    var started = users.filter(function(u){ return mainMap[u.email]||cfMap[u.email]; }).length;
    var week = Date.now() - 7*24*60*60*1000;
    var active7 = users.filter(function(u){ return u.last_seen && new Date(u.last_seen).getTime()>week; }).length;

    /* Count avg modules touched */
    var totalMods = 0;
    users.forEach(function(u){
      var c=0;
      if(cfMap[u.email]) c++;
      var md = mainMap[u.email]&&mainMap[u.email].data;
      if(md&&md.inputs&&Object.keys(md.inputs).some(function(k){return md.inputs[k];})) c++;
      if(md&&md['launch-v1']&&Object.keys(md['launch-v1']).some(function(k){return md['launch-v1'][k];})) c++;
      totalMods += c;
    });

    document.getElementById('s-total').textContent  = total;
    document.getElementById('s-active').textContent = started;
    document.getElementById('s-modules').textContent = started ? (totalMods/started).toFixed(1) : '0';
    document.getElementById('s-last').textContent   = active7;

    if (!total) {
      document.getElementById('loading').style.display='none';
      document.getElementById('user-empty').style.display='block';
      return;
    }

    var tbody = document.getElementById('user-tbody');
    tbody.innerHTML = '';

    users.forEach(function(user, idx) {
      var main = mainMap[user.email];
      var cf   = cfMap[user.email];
      var md   = main && main.data ? main.data : null;
      var cfd  = cf   && cf.data   ? cf.data   : null;

      /* Which modules have data */
      var hasCF = !!(cfd && Object.keys(cfd).some(function(k){ return k!=='cur'&&k!=='done'&&cfd[k]&&typeof cfd[k]==='string'&&cfd[k].trim(); }));
      var hasVW = !!(md && md.inputs && Object.keys(md.inputs).some(function(k){ return md.inputs[k]; }));
      var hasCC = hasVW; /* same table — best guess from inputs */
      var hasLA = !!(md && md['launch-v1'] && Object.keys(md['launch-v1']).some(function(k){ var v=md['launch-v1'][k]; return typeof v==='string'&&v.trim(); }));

      var initials = (user.name||user.email||'?').charAt(0).toUpperCase();
      var lastSeen = user.last_seen ? relTime(user.last_seen) : '—';

      var modBadges = [
        {label:'01 Foundation', has:hasCF},
        {label:'02 Visuals', has:hasVW},
        {label:'04 Launch', has:hasLA}
      ].map(function(b){
        return '<span class="mbadge'+(b.has?' has':'')+'">'+b.label+'</span>';
      }).join('');

      /* Main row */
      var tr = document.createElement('tr');
      tr.className = 'user-row';
      tr.setAttribute('data-idx', idx);
      tr.onclick = function(){ toggleDetail(idx, user, md, cfd); };
      tr.innerHTML = [
        '<td><div class="u-avatar">'+esc(initials)+'</div></td>',
        '<td><div class="u-name">'+esc(user.name||'—')+'</div><div class="u-email">'+esc(user.handle?'@'+user.handle:'')+'</div></td>',
        '<td><div class="u-email">'+esc(user.email)+'</div></td>',
        '<td><div class="mod-badges">'+modBadges+'</div></td>',
        '<td class="u-seen">'+lastSeen+'</td>',
        '<td style="text-align:center"><span class="expand-chevron">▾</span></td>'
      ].join('');
      tbody.appendChild(tr);

      /* Detail row (hidden by default) */
      var dtr = document.createElement('tr');
      dtr.className = 'detail-row';
      dtr.id = 'detail-'+idx;
      var dtd = document.createElement('td');
      dtd.className = 'detail-cell';
      dtd.colSpan = 6;
      dtd.innerHTML = '<div class="detail-inner" id="detail-inner-'+idx+'"><div style="font-size:12px;color:var(--dimmer)">Click to load answers...</div></div>';
      dtr.appendChild(dtd);
      tbody.appendChild(dtr);
    });

    /* Store data for detail rendering */
    window._adminUsers = users;
    window._adminMain  = mainMap;
    window._adminCf    = cfMap;

    document.getElementById('loading').style.display='none';
    document.getElementById('user-list').style.display='block';

  } catch(e) {
    document.getElementById('loading').innerHTML = '<div style="color:#e05555;font-size:13px">Failed to load: '+e.message+'</div>';
    console.error(e);
  }
}

function toggleDetail(idx, user, md, cfd) {
  var dtr = document.getElementById('detail-'+idx);
  var tr  = document.querySelector('[data-idx="'+idx+'"]');
  if (!dtr) return;
  var isOpen = dtr.classList.contains('open');
  /* Close all */
  document.querySelectorAll('.detail-row.open').forEach(function(r){ r.classList.remove('open'); });
  document.querySelectorAll('.user-row.expanded').forEach(function(r){ r.classList.remove('expanded'); });
  if (!isOpen) {
    dtr.classList.add('open');
    tr.classList.add('expanded');
    renderDetail(idx, user, md, cfd);
  }
}

function renderDetail(idx, user, md, cfd) {
  var inner = document.getElementById('detail-inner-'+idx);
  if (!inner) return;
  var html = '';

  /* ── MODULE SECTIONS ── */
  MODULE_DEFS.forEach(function(mod) {
    var fields = [];

    if (mod.id === 'cf' && cfd) {
      /* Flat brand-foundation data */
      mod.fields.forEach(function(k) {
        var v = cfd[k];
        if (v && typeof v==='string' && v.trim()) fields.push({k:k, v:v.trim()});
      });
      /* Also catch any unknown filled fields */
      Object.keys(cfd).forEach(function(k){
        if(mod.fields.indexOf(k)===-1 && k!=='cur'&&k!=='done'&&k!=='auditVals'){
          var v=cfd[k]; if(v&&typeof v==='string'&&v.trim()) fields.push({k:k,v:v.trim()});
        }
      });
    } else if (mod.id === 'vw' && md && md.inputs) {
      mod.fields.forEach(function(k) {
        var v = md.inputs[k];
        if (v && typeof v==='string' && v.trim()) fields.push({k:k, v:v.trim()});
      });
    } else if (mod.id === 'cc' && md && md.inputs) {
      /* Content fields — any input not already shown in VW */
      var vwFields = MODULE_DEFS[1].fields;
      Object.keys(md.inputs).forEach(function(k){
        if(vwFields.indexOf(k)===-1){
          var v=md.inputs[k]; if(v&&typeof v==='string'&&v.trim()) fields.push({k:k,v:v.trim()});
        }
      });
      /* Also show selected opts */
      if(md.opts) Object.keys(md.opts).forEach(function(k){
        var v=md.opts[k]; if(v&&typeof v==='string'&&v.trim()) fields.push({k:k,v:v.trim()});
      });
    } else if (mod.id === 'la' && md && md['launch-v1']) {
      var ld = md['launch-v1'];
      mod.fields.forEach(function(k){
        var v=ld[k]; if(v&&typeof v==='string'&&v.trim()) fields.push({k:k,v:v.trim()});
      });
      /* Also catch opt_ fields */
      Object.keys(ld).forEach(function(k){
        if(k.indexOf('opt_')===0){var v=ld[k];if(v&&v.trim())fields.push({k:k,v:v.trim()});}
      });
    }

    if (fields.length === 0) return; /* skip empty modules */

    html += '<div class="mod-section">';
    html += '<div class="mod-sec-head"><div class="mod-sec-num">'+mod.num+'</div><div class="mod-sec-title">'+mod.title+'</div><div class="mod-sec-rule"></div></div>';
    html += '<div class="ans-grid">';
    fields.forEach(function(f){
      var label = LABELS[f.k] || f.k.replace(/_/g,' ').replace(/([A-Z])/g,' $1').trim();
      html += '<div class="ans-card"><div class="ans-key">'+esc(label)+'</div><div class="ans-val">'+esc(f.v)+'</div></div>';
    });
    html += '</div></div>';
  });

  if (!html) html = '<div class="no-data">No answers saved yet.</div>';
  inner.innerHTML = html;
}

function relTime(iso) {
  var diff = Date.now() - new Date(iso).getTime();
  var m = Math.floor(diff/60000);
  if (m < 1)  return 'just now';
  if (m < 60) return m+'m ago';
  var h = Math.floor(m/60);
  if (h < 24) return h+'h ago';
  var d = Math.floor(h/24);
  if (d < 7)  return d+'d ago';
  return new Date(iso).toLocaleDateString();
}

function esc(s){ if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

document.getElementById('auth-pass').addEventListener('keydown', function(e){ if(e.key==='Enter') checkAuth(); });
